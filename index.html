/* ---- división gráfica de sectores (misma lógica que clasifica los pines) ---- */
function ray(angDeg,t){const a=angDeg*Math.PI/180;return [CENTER[0]+t*Math.sin(a),CENTER[1]+t*Math.cos(a)];}
const T=0.6;
const wedges={
 Oriente:[CENTER,ray(-45,T),ray(45,T)],
 Norte:[CENTER,ray(45,T),ray(135,T)],
 Poniente:[CENTER,ray(135,T),ray(225,T)],
 Sur:[CENTER,ray(225,T),ray(315,T)]
};
const overlay=L.layerGroup();
for(const s in wedges){
 L.polygon(wedges[s],{color:COL[s],weight:1.5,opacity:.5,fillColor:COL[s],fillOpacity:.10,dashArray:'5'}).addTo(overlay);
}
L.circle(CENTER,{radius:RKM*1000,color:COL['Centro'],weight:2.5,fillColor:COL['Centro'],fillOpacity:.13}).addTo(overlay);

for(const s in lbl){
 L.marker(lbl[s],{interactive:false,zIndexOffset:-500,icon:L.divIcon({className:'seclbl',

const cluster=L.markerClusterGroup({maxClusterRadius:40});
let addedLayer=L.layerGroup().addTo(map);
let markersById={};
function passFilter(f){
 const secs=[...document.querySelectorAll('.fs:checked')].map(c=>c.value);
 const niv=document.getElementById('niv').value;
 const q=(document.getElementById('q').value||'').toLowerCase();
 const hide=document.getElementById('hidedone').checked;
 if(!secs.includes(f.sector))return false;
 if(niv && f.nivel!==niv)return false;
 if(q && !f.nombre.toLowerCase().includes(q))return false;
 const st=stOf(f);
 if(hide && (st==='Atendida'||st==='No interesada'))return false;
 return true;
}
function build(){
 cluster.clearLayers(); addedLayer.clearLayers(); markersById={};
 DATA.forEach(f=>{
  if(!passFilter(f))return;
  const stl=mStyle(f);
  if(callOf(f)){ stl.color='#6f42c1'; stl.weight=3.5; stl.dashArray='4'; }
  let m;
  if(f.added){
   m=L.marker([f.lat,f.lon],{draggable:true,icon:L.divIcon({className:'',
     html:`<div style="width:16px;height:16px;border-radius:50%;background:${COL[f.sector]};border:2px solid #fff;box-shadow:0 0 3px #0007"></div>`,
     iconSize:[16,16],iconAnchor:[8,8]})});
   m.on('dragend',()=>{ const ll=m.getLatLng(); f.lat=ll.lat; f.lon=ll.lng;
     const a=ADDED.find(x=>x.id===f.id); if(a){a.lat=ll.lat; a.lon=ll.lng; saveAdded();} });
   addedLayer.addLayer(m);
  } else {
   m=L.circleMarker([f.lat,f.lon],stl);
   cluster.addLayer(m);
  }
  m._f=f; m.bindPopup(()=>popupHTML(f));
  markersById[f.id]=m;
 });
 map.addLayer(cluster);
}

/* importar avance desde un CSV exportado (combina por id, o por CCT / Nombre) */
function parseCSV(t){
 const out=[]; let row=[],cur='',q=false;
 for(let i=0;i<t.length;i++){const c=t[i];
  if(q){ if(c=='"'){ if(t[i+1]=='"'){cur+='"';i++;} else q=false; } else cur+=c; }
  else { if(c=='"')q=true; else if(c==',')1,row.push(cur),cur=''; else if(c=='\n'){row.push(cur);out.push(row);row=[];cur='';} else if(c!='\r')cur+=c; }
 }
 if(cur!==''||row.length){row.push(cur);out.push(row);}
 return out;
}
document.getElementById('importbtn').onclick=()=>document.getElementById('importfile').click();
document.getElementById('importfile').onchange=function(e){
 const file=e.target.files[0]; if(!file)return;
 const rd=new FileReader();
 rd.onload=()=>{
  let txt=rd.result.replace(/^﻿/,'');
  const rows=parseCSV(txt); if(!rows.length)return;
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const ix=n=>head.indexOf(n);
  const iId=ix('id'),iCct=ix('cct'),iNom=ix('nombre'),iEst=ix('estatus'),iNota=ix('nota'),
        iCall=ix('fechallamada'),iSec=ix('sector'),iNiv=ix('nivel'),iTel=ix('telefono'),
        iLat=ix('lat'),iLon=ix('lon'),iAdd=ix('agregada');
  const mId={},mCct={},mNom={};
  DATA.forEach(f=>{ mId[f.id]=f; if(f.cct)mCct[f.cct]=f; mNom[f.nombre.toLowerCase()]=f; });
  let n=0;
  for(let r=1;r<rows.length;r++){
   const row=rows[r]; if(!row||row.length<2)continue;
   const get=i=>i>=0?(row[i]||'').trim():'';
   let f=(iId>=0&&mId[row[iId]])||(iCct>=0&&mCct[row[iCct]])||(iNom>=0&&mNom[get(iNom).toLowerCase()]);
   if(!f && get(iAdd)==='Si' && get(iNom)){
    const la=parseFloat(get(iLat)), lo=parseFloat(get(iLon));
    f={id:get(iId)||('add_'+Date.now()+'_'+r),nombre:get(iNom),nivel:get(iNiv)||'Escuela',
       sector:get(iSec)||'Centro',turno:'',cct:'',tel:get(iTel),dom:'',
       lat:isNaN(la)?SECT_CENTER['Centro'][0]:la,lon:isNaN(lo)?SECT_CENTER['Centro'][1]:lo,
       fuente:'Agregada manualmente',added:true};
    DATA.push(f); ADDED.push(f); mId[f.id]=f;
   }
   if(!f)continue;
   const est=get(iEst); if(est&&STCOL[est]!==undefined){ if(est==='Sin contactar')delete STORE[f.id]; else STORE[f.id]=est; }
   const nota=get(iNota); if(nota)NOTES[f.id]=nota;
   const call=get(iCall); if(call)CALLS[f.id]=call;
   n++;
  }
  _ref.set({store:STORE,notes:NOTES,calls:CALLS},{merge:true}).catch(e=>toast('Error al subir: '+e.message));
  saveAdded();
  build(); updateCounts(); renderList();
  toast('Avance importado a la nube: '+n+' escuelas.');
 };
 rd.readAsText(file,'utf-8');
 e.target.value='';
};

/* ---- modales ---- */
function openModal(html){ document.getElementById('mbox').innerHTML=html; document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function toast(msg){ const t=document.createElement('div'); t.textContent=msg;
 t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 16px;border-radius:8px;z-index:3000;font-size:13px;box-shadow:0 2px 10px rgba(0,0,0,.4);max-width:80vw;text-align:center';
 document.body.appendChild(t); setTimeout(()=>{t.style.transition='opacity .4s';t.style.opacity='0';},2800); setTimeout(()=>t.remove(),3300); }
document.getElementById('modal').onclick=e=>{ if(e.target.id==='modal')closeModal(); };
function openCallModal(f){ if(!f)return;
 const cur=callOf(f), d=cur?cur.split('T')[0]:'', t=cur?cur.split('T')[1]:'09:00';
 openModal(`<h3>📞 Programar llamada</h3><div style="font-size:12px;color:#666">${f.nombre}</div>
  <label>Fecha</label><input type="date" id="cd" value="${d}">
  <label>Hora</label><input type="time" id="ct" value="${t}">
  <div class="mrow">${cur?'<button class="bsec" id="cdel">Quitar</button>':''}
   <button class="bsec" id="cx">Cancelar</button><button class="bprim" id="cok">Guardar</button></div>`);
 document.getElementById('cx').onclick=closeModal;
 const del=document.getElementById('cdel'); if(del)del.onclick=()=>{setCall(f,''); closeModal();};
 document.getElementById('cok').onclick=()=>{const dd=document.getElementById('cd').value,tt=document.getElementById('ct').value||'09:00';
  if(!dd){toast('Elige una fecha');return;} setCall(f,dd+'T'+tt); closeModal();};
}
function openNoteModal(f){ if(!f)return;
 openModal(`<h3>📝 Nota</h3><div style="font-size:12px;color:#666">${f.nombre}</div>
  <label>Nota</label><textarea id="ntx" placeholder="Escribe aquí...">${noteOf(f).replace(/</g,'&lt;')}</textarea>
  <div class="mrow"><button class="bsec" id="nx">Cancelar</button><button class="bprim" id="nok">Guardar</button></div>`);
 document.getElementById('nx').onclick=closeModal;
 document.getElementById('nok').onclick=()=>{ setNote(f,document.getElementById('ntx').value.trim()); closeModal(); };
}
function openAddModal(){
 openModal(`<h3>➕ Agregar escuela</h3>
  <label>Nombre *</label><input id="aNom">
  <label>Nivel</label><select id="aNiv"><option>Primaria</option><option>Secundaria</option><option>Media superior</option><option>Escuela</option></select>
  <label>Sector</label><select id="aSec">${SECTS.map(s=>'<option>'+s+'</option>').join('')}</select>
  <label>Dirección (para ubicarla)</label><input id="aDir" placeholder="Calle y número, colonia">
  <label>Teléfono (opcional)</label><input id="aTel">
  <div class="mrow"><button class="bsec" id="ax">Cancelar</button><button class="bprim" id="aok">Agregar</button></div>
  <div id="amsg" style="font-size:12px;color:#666;margin-top:8px"></div>`);
 document.getElementById('ax').onclick=closeModal;
 document.getElementById('aok').onclick=async()=>{
  const nom=document.getElementById('aNom').value.trim(); if(!nom){toast('Pon el nombre de la escuela');return;}
  const niv=document.getElementById('aNiv').value, sec=document.getElementById('aSec').value;
  const dir=document.getElementById('aDir').value.trim(), tel=document.getElementById('aTel').value.trim();
  const msg=document.getElementById('amsg'); msg.textContent='Ubicando dirección...';
  let lat=SECT_CENTER[sec][0], lon=SECT_CENTER[sec][1], aprox=true;
  if(dir){ try{
    const u='https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=mx&q='+encodeURIComponent(dir+', Chihuahua, Chihuahua, México');
    const r=await fetch(u); const j=await r.json();
    if(j&&j[0]){const la=+j[0].lat,lo=+j[0].lon; if(la>28.4&&la<28.9&&lo>-106.4&&lo<-105.8){lat=la;lon=lo;aprox=false;}}
   }catch(e){} }
  const id='add_'+Date.now();
  const f={id,nombre:nom,nivel:niv,sector:sec,turno:'',cct:'',tel,dom:dir,lat,lon,fuente:'Agregada manualmente',added:true};
  DATA.push(f); ADDED.push(f); saveAdded();
  build(); updateCounts(); renderList(); closeModal(); focusSchool(id);
  if(aprox)toast('No ubiqué la dirección con precisión; el pin quedó en el sector '+sec+'. Arrástralo en el mapa para ajustarlo.');
 };
}
document.getElementById('addschool').onclick=openAddModal;

document.querySelectorAll('.fs').forEach(c=>c.addEventListener('change',build));
document.getElementById('niv').addEventListener('change',build);
document.getElementById('q').addEventListener('input',build);
document.getElementById('hidedone').addEventListener('change',build);
document.getElementById('toverlay').addEventListener('change',function(){
 if(this.checked) overlay.addTo(map); else map.removeLayer(overlay);
});

/* ---- login + sincronización en vivo ---- */
function applySnap(d){
 d=d||{};
 STORE=d.store||{}; NOTES=d.notes||{}; CALLS=d.calls||{};
 const am=d.addedMap||{}; ADDED=Object.keys(am).map(k=>am[k]);
 DATA=BASE.concat(ADDED);
 build(); updateCounts(); renderList();
}
let _subscribed=false;
function subscribe(){
 if(_subscribed){applySnap(); return;} _subscribed=true;
 _ref.set({_t:Date.now()},{merge:true}).catch(()=>{});
 _ref.onSnapshot(s=>applySnap(s.data()), e=>toast('Error de sincronización: '+e.message));
 build(); updateCounts(); renderList();
}
const _loginEl=document.getElementById('login'), _msgEl=document.getElementById('loginmsg'), _logoutEl=document.getElementById('logout');
function showLogin(msg){ _loginEl.style.display='flex'; _logoutEl.style.display='none'; _msgEl.textContent=msg||''; }
function hideLogin(){ _loginEl.style.display='none'; _logoutEl.style.display='block'; }
document.getElementById('gbtn').onclick=()=>{ _msgEl.textContent='Redirigiendo a Google...';
 const p=new firebase.auth.GoogleAuthProvider();
 _auth.signInWithRedirect(p).catch(e=>{ _msgEl.textContent='No se pudo iniciar sesión: '+e.message; });
};
_auth.getRedirectResult().catch(e=>{ _msgEl.textContent='Error al volver de Google: '+e.message; });
_logoutEl.onclick=()=>_auth.signOut();
_auth.onAuthStateChanged(u=>{
 if(u && ALLOWED.includes((u.email||'').toLowerCase())){ hideLogin(); subscribe(); }
 else if(u){ showLogin('La cuenta '+u.email+' no está autorizada. Entra con una cuenta del equipo.'); setTimeout(()=>_auth.signOut(),50); }
 else { showLogin(); }
});
</script></body></html>
